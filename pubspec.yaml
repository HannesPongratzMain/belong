name: belong
description: "belong — verbindet Menschen über konkrete Aktivitäten statt über Profile. Uni-Prototyp (UI/UX & sichere Mensch-Technik-Interaktion)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  http: ^1.6.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Reines Build-Werkzeug (kein Runtime-Plugin): erzeugt Launcher-Icons
  # aus assets/icon/ — Quell-PNGs kommen aus tool/generate_icons.dart.
  flutter_launcher_icons: ^0.14.4

# Launcher-Icon: Marken-Funke (Beere) auf Creme, siehe tool/generate_icons.dart.
# Neu erzeugen: flutter test tool/generate_icons.dart && dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: false
  adaptive_icon_background: "#F1E8DA"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#F1E8DA"
    theme_color: "#F1E8DA"

flutter:
  uses-material-design: true

  # Design-Handoff-Fonts, lokal gebündelt (offline-fähig, identisch auf allen Plattformen).
  fonts:
    - family: Luckiest Guy
      fonts:
        - asset: assets/fonts/LuckiestGuy-Regular.ttf
    - family: Hedvig Letters Serif
      fonts:
        - asset: assets/fonts/HedvigLettersSerif-Regular.ttf
    - family: Hanken Grotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/HankenGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/HankenGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/HankenGrotesk-Bold.ttf
          weight: 700
